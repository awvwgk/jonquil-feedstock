{% set name = "jonquil" %}
{% set version = "0.3.0" %}

package:
  name: {{ name }}-pkg
  version: {{ version }}

source:
  url: https://github.com/toml-f/jonquil/releases/download/v{{ version }}/jonquil-{{ version }}.tar.xz
  sha256: 4bc3f0ae47ac2e009a0dc733ad9d0f16db4dfed13b50f58b9a06bb3a579eec47

build:
  number: 3

outputs:
  - name: {{ name }}
    script: build_pkg.sh   # [unix]
    script: build_pkg.bat  # [win]
    build:
      string: {{ module_abi }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}
      run_exports:
        - {{ pin_subpackage(name, max_pin='x.x') }}
      ignore_run_exports:
        - test-drive  # test dependency only

    requirements:
      build:
        - {{ stdlib('c') }}  # [unix]
        - {{ stdlib('m2w64_c') }}  # [win]
        - {{ compiler('c') }}  # [unix]
        - {{ compiler('fortran') }}  # [unix]
        - {{ compiler('m2w64_c') }}  # [win]
        - {{ compiler('m2w64_fortran') }}  # [win]
        - meson
        - ninja
        - pkg-config
      host:
        - test-drive-devel * {{ module_abi }}_*
        - toml-f-devel * {{ module_abi }}_*

    test:
      requires:
        - pkg-config
      commands:
        - pkg-config {{ name }} --exact-version {{ version }}
        - test -f $PREFIX/lib/lib{{ name }}$SHLIB_EXT  # [unix]
        - test ! -f $PREFIX/lib/lib{{ name }}.a  # [unix]
        - test ! -f $PREFIX/lib/libtest-drive$SHLIB_EXT  # [unix]

  - name: {{ name }}-devel
    build:
      string: {{ module_abi }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}
      run_exports:
        - {{ pin_subpackage(name, max_pin='x.x') }} {{ module_abi }}_*

    requirements:
      run:
        - {{ pin_subpackage(name, max_pin='x.x') }} {{ module_abi }}_*

    test:
      requires:
        - pkg-config
      commands:
        - pkg-config {{ name }} --exact-version {{ version }}
        - test -f $PREFIX/lib/lib{{ name }}$SHLIB_EXT  # [unix]
        - test ! -f $PREFIX/lib/lib{{ name }}.a  # [unix]
        - test ! -f $PREFIX/lib/libtest-drive$SHLIB_EXT  # [unix]

about:
  home: https://toml-f.github.io/jonquil/
  dev_url: https://github.com/toml-f/jonquil
  doc_url: https://toml-f.readthedocs.io/en/latest/how-to/jonquil/
  license: Apache-2.0 OR MIT
  license_file:
    - LICENSE-Apache
    - LICENSE-MIT
  summary: >-
    JSON parser implementation for data serialization and deserialization in Fortran 

extra:
  recipe-maintainers:
    - awvwgk
  feedstock-name: {{ name }}
